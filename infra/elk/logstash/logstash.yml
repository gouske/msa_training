# ============================================================
# [Logstash 전역 설정]
# ============================================================
# Logstash 서버 자체의 동작을 제어하는 설정입니다.
# 실제 데이터 처리 흐름(파이프라인)은 별도 파일(logstash.conf)에서 정의합니다.
# ============================================================

# Logstash 모니터링 API를 외부에서 접근할 수 있게 허용합니다 (컨테이너 환경용).
http.host: "0.0.0.0"

# 파이프라인 설정 파일들이 위치한 경로입니다.
# 이 경로 안의 *.conf 파일을 자동으로 읽어 파이프라인을 구성합니다.
path.config: /usr/share/logstash/pipeline

# [학습용] 배치 처리 설정
# 한 번에 처리할 이벤트 수와 대기 시간을 설정합니다.
pipeline.batch.size: 125    # 한 번에 최대 125개 이벤트를 모아서 처리
pipeline.batch.delay: 50    # 50ms 동안 이벤트를 모은 후 처리 시작
