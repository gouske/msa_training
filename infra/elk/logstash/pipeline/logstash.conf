# ============================================================
# [Logstash 파이프라인] 로그 처리 흐름 정의
# ============================================================
# 데이터 흐름: INPUT(입력) → FILTER(가공) → OUTPUT(출력)
#
# Filebeat에서 받은 Docker 컨테이너 로그를 가공하여
# Elasticsearch에 날짜별 인덱스로 저장합니다.
# ============================================================

# ─── INPUT: 로그를 어디서 받을 것인가? ───
input {
  # Filebeat로부터 로그를 수신합니다.
  # Filebeat는 Docker 컨테이너 로그를 수집해서 이 포트로 전송합니다.
  beats {
    port => 5044  # Filebeat가 연결할 포트 번호
  }
}

# ─── FILTER: 로그를 어떻게 가공할 것인가? ───
filter {
  # Docker 컨테이너 이름에서 서비스명을 추출합니다.
  # 예: "msa_training-order-service-1" → service_name 필드에 저장
  if [container][name] {
    mutate {
      # 컨테이너 이름을 service_name 이라는 새 필드에 복사합니다.
      # Kibana에서 이 필드로 서비스별 필터링이 가능해집니다.
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # 불필요한 메타데이터 필드를 제거하여 Elasticsearch 저장 용량을 절약합니다.
  # agent, ecs, input 등은 Filebeat가 자동으로 추가하는 내부 정보입니다.
  mutate {
    remove_field => ["agent", "ecs", "input"]
  }
}

# ─── OUTPUT: 가공된 로그를 어디에 저장할 것인가? ───
output {
  # Elasticsearch에 저장합니다.
  elasticsearch {
    hosts => ["elasticsearch:9200"]          # Elasticsearch 컨테이너 주소
    index => "msa-logs-%{+YYYY.MM.dd}"      # 날짜별로 인덱스를 분리합니다
    # 예: msa-logs-2026.04.05, msa-logs-2026.04.06, ...
    # 날짜별 분리의 장점: 오래된 로그를 인덱스 단위로 한꺼번에 삭제 가능
  }

  # [디버깅용] Logstash 터미널에도 로그를 출력합니다.
  # 정상 동작 확인 후 아래 줄을 주석 처리하세요 (로그가 매우 많아집니다).
  # stdout { codec => rubydebug }
}
