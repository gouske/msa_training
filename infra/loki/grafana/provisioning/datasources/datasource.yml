# ============================================================
# [Grafana 데이터소스 자동 설정]
# ============================================================
# Grafana가 시작될 때 이 파일을 읽어서
# Loki를 데이터소스로 자동 등록합니다.
# 수동으로 Grafana UI에서 추가할 필요가 없습니다.
#
# ELK에서 Kibana가 Elasticsearch에 자동 연결되는 것처럼,
# Grafana도 이 설정으로 Loki에 자동 연결됩니다.
# ============================================================

apiVersion: 1

datasources:
  # Loki를 기본 데이터소스로 등록합니다.
  - name: Loki                   # Grafana UI에 표시될 이름
    type: loki                   # 데이터소스 유형
    access: proxy                # Grafana 서버가 Loki에 대신 요청합니다 (브라우저 직접 접근 아님)
    url: http://loki:3100        # Loki 서버 주소 (Docker 내부 네트워크)
    isDefault: true              # 기본 데이터소스로 설정 (Explore 메뉴에서 자동 선택됨)
