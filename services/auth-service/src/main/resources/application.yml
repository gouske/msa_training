spring:
  application:
    name: auth-service
  datasource:
    # DB가 어디 있는지 주소를 적습니다 (내 컴퓨터의 5432번 포트)
    url: jdbc:postgresql://localhost:5432/auth_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    # 서비스를 켤 때마다 테이블을 자동으로 만들어주는 마법 같은 설정
    hibernate:
      ddl-auto: update
    # 데이터베이스와 어떤 대화를 하는지 콘솔창에 보여줘!
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# 왼쪽 끝에 딱 붙여서 시작
jwt:
  # ${이름:기본값}은 "이 이름의 환경변수가 있으면 쓰고, 없으면 기본값을 써"라는 뜻입니다.
  secret: ${JWT_SECRET_KEY:default-local-test-key-1234567890}
  # [제20강 추가] JWT 발급자(issuer)와 대상(audience) — Gateway가 이 값을 검증합니다.
  issuer: ${JWT_ISSUER:msa-auth-service}
  audience: ${JWT_AUDIENCE:msa-gateway}

# Consul 서비스 디스커버리 설정
consul:
  host: ${CONSUL_HOST:localhost}
  port: ${CONSUL_PORT:8500}
  # [실전 #6] /actuator/health 는 SecurityConfig 의 화이트리스트에 없어 403.
  # AuthController 가 제공하는 /api/auth/health (AUTH_GET_WHITELIST 에 등록됨) 사용.
  # order-service 의 /api/order/health, payment-service 의 /api/payment/health 와 패턴 일관성 유지.
  health-path: /api/auth/health
  service-address: ${CONSUL_SERVICE_ADDRESS:#{null}}

# [제24강 Phase 2 + Codex review #2 반영] Actuator / Micrometer 메트릭 노출
#
# 보안 격리:
#   - server.port (8080) : 비즈니스 API (Gateway 가 라우팅)
#   - management.server.port (9081) : Actuator 전용 — docker-compose 에서 호스트 포트 노출 X.
#     Prometheus 컨테이너만 내부 네트워크로 도달 가능. 외부 사용자가 Gateway 의 /auth/* 익명 라우트
#     를 통해 actuator 에 접근하는 경로가 차단된다.
#   - Gateway 도 /auth/actuator/** 를 명시적 거부 미들웨어로 추가 차단 (defense in depth).
#
# 노출 endpoint 는 health, prometheus 만 — env / beans / mappings 등 sensitive 는 비공개.
management:
  server:
    port: 9081
    address: 0.0.0.0
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      # 모든 메트릭에 service 라벨을 자동 부여 → Grafana 에서 4 서비스 일관 검색.
      service: auth-service

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.orm.jpa: debug