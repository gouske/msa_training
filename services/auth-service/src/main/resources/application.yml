spring:
  application:
    name: auth-service
  datasource:
    # DB가 어디 있는지 주소를 적습니다 (내 컴퓨터의 5432번 포트)
    url: jdbc:postgresql://localhost:5432/auth_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    # 서비스를 켤 때마다 테이블을 자동으로 만들어주는 마법 같은 설정
    hibernate:
      ddl-auto: update
    # 데이터베이스와 어떤 대화를 하는지 콘솔창에 보여줘!
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# 왼쪽 끝에 딱 붙여서 시작
jwt:
  # ${이름:기본값}은 "이 이름의 환경변수가 있으면 쓰고, 없으면 기본값을 써"라는 뜻입니다.
  secret: ${JWT_SECRET_KEY:default-local-test-key-1234567890}
  # [제20강 추가] JWT 발급자(issuer)와 대상(audience) — Gateway가 이 값을 검증합니다.
  issuer: ${JWT_ISSUER:msa-auth-service}
  audience: ${JWT_AUDIENCE:msa-gateway}

# Consul 서비스 디스커버리 설정
consul:
  host: ${CONSUL_HOST:localhost}
  port: ${CONSUL_PORT:8500}
  health-path: /actuator/health
  service-address: ${CONSUL_SERVICE_ADDRESS:#{null}}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.orm.jpa: debug