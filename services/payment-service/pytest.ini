[pytest]
# [실전 #6] pytest-asyncio: async 테스트를 자동 감지하여 실행
asyncio_mode = auto

# [제24강 Phase 2] main.py 가 module-load 시점에 INTERNAL_API_KEY 를 강제하므로
# 일부 테스트(test_health.py, test_payment.py 등) 가 collection 단계에서 실패한다.
# 테스트 더미 값을 환경변수로 주입해 collection 을 통과시킨다.
env =
    INTERNAL_API_KEY=test-internal-api-key-for-pytest
