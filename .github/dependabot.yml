# Dependabot 설정 — GitHub Actions 의존성 자동 업데이트
#
# 역할: 아래 경로의 workflow 파일들에서 사용하는 3rd-party GitHub Action
#       (actions/checkout, docker/login-action 등) 의 새 버전이 공개되면
#       Dependabot 이 PR 을 자동으로 생성한다.
#
# SHA pinning 정책(Issue #7 반영)을 유지하기 위해 `pin-updates: true`는 없지만,
# Dependabot 은 기본적으로 pinning 된 SHA 와 옆에 달린 `# v4` 주석을
# 함께 읽어 다음 버전의 SHA 로 업데이트한 PR 을 만든다.
# 따라서 우리는 PR 을 검토/머지하는 것만으로 최신 보안 패치를 받을 수 있다.
#
# 참고: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # GitHub Actions workflow 파일 감시
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # 주 1회 월요일 아침 체크 (학습 프로젝트 기준, PR 알림 부담 최소)
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
