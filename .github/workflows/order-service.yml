# [GitHub Actions] Order Service CI/CD 파이프라인
#
# 트리거 조건: services/order-service/ 하위 파일이 변경된 경우만 실행
# CI: Node.js 24 + jest 테스트
# CD: Docker 이미지 빌드 → Docker Hub 푸시 (main 브랜치 push 시)

name: Order Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'services/order-service/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/order-service/**'

jobs:
  # ─────────────────────────────────────────
  # Job 1: 테스트 실행 (CI)
  # TDD 관점: 테스트가 통과해야만 빌드로 넘어간다.
  # ─────────────────────────────────────────
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      # Node.js 24 설치 + npm 캐시 (빌드 속도 향상)
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/order-service/package-lock.json

      # npm ci: package-lock.json 을 정확히 재현 (CI 환경 권장)
      - name: 의존성 설치
        run: npm ci
        working-directory: services/order-service

      # jest 실행 (package.json scripts.test 사용)
      - name: 테스트 실행
        run: npm test
        working-directory: services/order-service

  # ─────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & 푸시 (CD)
  # needs: test → 테스트 Job이 성공해야만 실행된다.
  # main 브랜치 push 시에만 실행 (PR에서는 테스트만)
  # ─────────────────────────────────────────
  build-and-push:
    name: Docker 빌드 & 푸시
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      # GitHub Secrets 에 등록된 Docker Hub 자격증명 사용
      # ⚠️ YAML에 비밀번호를 직접 쓰지 않는다.
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이중 태그 전략:
      #   latest  → 항상 최신 이미지
      #   git SHA → 특정 커밋의 이미지를 특정해 롤백 가능
      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: services/order-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest
            ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}

  # ─────────────────────────────────────────
  # Job 3: 배포 완료 알림
  # ─────────────────────────────────────────
  notify:
    name: 배포 완료 알림
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: 배포 결과 출력
        run: |
          echo "✅ Order Service 배포 완료!"
          echo "이미지: ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}"
          echo "배포 시간: $(date)"
