# [GitHub Actions] Gateway Service CI/CD 파이프라인
#
# 트리거 조건: services/gateway-service/ 하위 파일이 변경된 경우만 실행
# CI: .NET 8 + xUnit (GatewayService.Tests)
# CD: Docker 이미지 빌드 → Docker Hub 푸시 (main 브랜치 push 시)

name: Gateway Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'services/gateway-service/**'
      - '.github/workflows/gateway-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/gateway-service/**'
      - '.github/workflows/gateway-service.yml'

jobs:
  # ─────────────────────────────────────────
  # Job 1: 테스트 실행 (CI)
  # xUnit + WebApplicationFactory 기반 통합 테스트
  # ─────────────────────────────────────────
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # .NET 8 SDK 설치
      - name: .NET 8 SDK 설정
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      # NuGet 패키지 복원 (캐시 포함)
      - name: 패키지 복원
        run: dotnet restore
        working-directory: services/gateway-service

      # 빌드 검증 (--no-restore: 이전 단계에서 복원했으므로 생략)
      - name: 빌드
        run: dotnet build --no-restore -c Release
        working-directory: services/gateway-service

      # xUnit 테스트 실행
      # --no-build: 빌드 단계에서 이미 컴파일됨
      - name: 테스트 실행
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: services/gateway-service
        env:
          # 테스트용 JWT 설정 (실제 키 아님)
          # appsettings.json / JwtAuthenticationTests.TestSecretKey 와 일치해야 토큰 서명 검증이 통과함
          Jwt__SecretKey: default-local-test-key-1234567890

  # ─────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & 푸시 (CD)
  # ─────────────────────────────────────────
  build-and-push:
    name: Docker 빌드 & 푸시
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker Hub 로그인
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: services/gateway-service/GatewayService
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gateway-service:latest
            ${{ secrets.DOCKER_USERNAME }}/gateway-service:${{ github.sha }}

  notify:
    name: 배포 완료 알림
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: 배포 결과 출력
        run: |
          echo "✅ Gateway Service 배포 완료!"
          echo "이미지: ${{ secrets.DOCKER_USERNAME }}/gateway-service:${{ github.sha }}"
          echo "배포 시간: $(date)"
