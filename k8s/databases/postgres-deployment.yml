# [K8s] PostgreSQL Deployment + PVC + Service (Auth Service 전용 DB)
# ⚠️  학습/개발 환경용. 프로덕션에서는 Amazon RDS, Cloud SQL 등 관리형 DB 를 사용한다.
#
# StatefulSet vs Deployment:
#   - DB 는 상태가 있으므로 StatefulSet 이 정석이나, 학습 단순화를 위해 Deployment + PVC 로 대체
#   - PVC 로 데이터 영속화는 확보했지만, Pod 순서 보장·고정 네트워크 ID 등
#     StatefulSet 이 제공하는 나머지 이점은 누락됨
---
# PersistentVolumeClaim: Pod 재시작/재스케줄링 시에도 데이터 보존
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-db-data
  namespace: msa-training
  labels:
    app: auth-db
spec:
  accessModes:
    - ReadWriteOnce        # 단일 노드에서만 read/write (대부분의 블록 스토리지가 지원)
  resources:
    requests:
      storage: 2Gi
  # storageClassName 을 지정하지 않으면 클러스터의 default StorageClass 가 사용됨
  # (minikube, kind, GKE, EKS 등 대부분 default 제공)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: msa-training
  labels:
    app: auth-db
spec:
  # DB 는 단일 인스턴스. PVC 가 ReadWriteOnce 이므로 replicas: 1 필수
  replicas: 1
  strategy:
    # 단일 PVC 를 공유하므로 RollingUpdate 시 두 Pod 가 동시에 볼륨에 쓰려다 실패
    # → Recreate 로 기존 Pod 완전 종료 후 새 Pod 생성
    type: Recreate
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432

          # Secret 에서 PostgreSQL 자격증명 주입
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_DB
            # postgres 이미지가 실제 데이터를 저장하는 경로. PVC 마운트 위치와 일치시킨다.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          # PVC 를 /var/lib/postgresql/data 에 마운트해 데이터 영속화
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # readinessProbe 는 Secret 에서 주입한 실제 계정/DB 이름을 참조
          # 자격증명을 바꿔도 probe 가 깨지지 않도록 env 를 인용한다.
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auth-db-data

---
# PostgreSQL Service: Auth Service 가 auth-db:5432 로 접근
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: msa-training
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
