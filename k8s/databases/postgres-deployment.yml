# [K8s] PostgreSQL Deployment + Service (Auth Service 전용 DB)
# ⚠️  학습/개발 환경용. 프로덕션에서는 Amazon RDS, Cloud SQL 등 관리형 DB 서비스를 사용한다.
#
# StatefulSet vs Deployment:
#   - DB 는 상태가 있으므로 StatefulSet 이 이상적이나, 학습 단순화를 위해 Deployment 사용
#   - 프로덕션에서는 StatefulSet + PersistentVolume 을 사용할 것
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: msa-training
  labels:
    app: auth-db
spec:
  # DB 는 단일 인스턴스로 운영 (단, StatefulSet 미사용으로 데이터 유실 위험 있음)
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432

          # Secret 에서 PostgreSQL 자격증명 주입
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: POSTGRES_DB

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # PostgreSQL 준비 상태 확인: pg_isready 명령어 사용
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - myuser
                - -d
                - auth_db
            initialDelaySeconds: 10
            periodSeconds: 10

---
# PostgreSQL Service: Auth Service 가 auth-db:5432 로 접근
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: msa-training
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
