# [K8s] MongoDB Deployment + Service (Order Service 전용 DB)
# ⚠️  학습/개발 환경용. 프로덕션에서는 MongoDB Atlas 등 관리형 서비스를 사용한다.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: msa-training
  labels:
    app: order-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_DATABASE
              value: "order_db"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # MongoDB 준비 상태 확인: mongosh ping 명령어 사용
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10

---
# MongoDB Service: Order Service 가 order-db:27017 로 접근
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: msa-training
spec:
  selector:
    app: order-db
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
