# [K8s] Secret: 민감한 정보를 Base64 인코딩하여 저장
# ⚠️  Base64는 암호화가 아니다! 누구나 디코딩할 수 있다.
#     실무에서는 Sealed Secrets(Bitnami) 또는 HashiCorp Vault를 사용한다.
#
# Base64 인코딩 방법:
#   echo -n "myuser" | base64       → bXl1c2Vy
#   echo -n "mypassword" | base64  → bXlwYXNzd29yZA==
#   echo -n "auth_db" | base64     → YXV0aF9kYg==
#
# ⚠️  이 파일을 Git에 커밋하지 말 것! (학습용 더미 값만 예외)
apiVersion: v1
kind: Secret
metadata:
  name: msa-secrets
  namespace: msa-training
type: Opaque
data:
  # PostgreSQL 자격증명 (Auth Service DB)
  # 원문: myuser
  POSTGRES_USER: bXl1c2Vy
  # 원문: mypassword
  POSTGRES_PASSWORD: bXlwYXNzd29yZA==
  # 원문: auth_db
  POSTGRES_DB: YXV0aF9kYg==

  # JWT 비밀 키 (Gateway ↔ Auth Service 공유)
  # 원문: default-local-test-key-1234567890
  JWT_SECRET_KEY: ZGVmYXVsdC1sb2NhbC10ZXN0LWtleS0xMjM0NTY3ODkw

  # 서비스 간 내부 API 키 (Order ↔ Payment)
  # 원문: msa-training-internal-key-2026
  INTERNAL_API_KEY: bXNhLXRyYWluaW5nLWludGVybmFsLWtleS0yMDI2
