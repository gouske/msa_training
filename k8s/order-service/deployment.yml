# [K8s] Deployment: Pod 의 생성·복제·업데이트를 관리하는 컨트롤러
# "order-service Pod 을 2개 유지하고, 죽으면 자동으로 재생성하라"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: msa-training
  labels:
    app: order-service
    context: order    # DDD Bounded Context 식별 레이블
spec:
  # replicas: 동시에 실행할 Pod 복제본 수
  # 2개 이상이면 하나가 죽어도 서비스 지속 가능
  replicas: 2

  # selector: 이 Deployment 가 관리할 Pod 을 선택하는 기준
  selector:
    matchLabels:
      app: order-service

  # strategy: 업데이트 배포 전략
  # RollingUpdate: 구 버전 Pod 을 하나씩 제거하면서 신 버전 Pod 을 추가 → 무중단 배포
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 업데이트 중 최대 1개 추가 Pod 허용
      maxUnavailable: 0  # 업데이트 중 기존 Pod 제거 금지 (안전 우선)

  # template: 생성할 Pod 의 실제 정의
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          # CI/CD 파이프라인(GitHub Actions)에서 빌드한 이미지 사용
          # 실제 배포 시 your-dockerhub 를 본인 Docker Hub 사용자명으로 교체
          image: your-dockerhub/order-service:latest
          ports:
            - containerPort: 8081

          # 환경 변수: ConfigMap 전체를 한 번에 주입
          envFrom:
            - configMapRef:
                name: msa-config

          # Secret 에서 개별 값 주입
          env:
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: INTERNAL_API_KEY
            # [제22강] Consul 등록용 — Gateway 가 폴링으로 order 인스턴스를 찾는다
            - name: CONSUL_HOST
              value: "consul"
            - name: CONSUL_PORT
              value: "8500"
            - name: CONSUL_SERVICE_ADDRESS
              value: "order-service"

          # resources: CPU/메모리 제한
          # requests: 스케줄링 시 보장되는 최소 리소스
          # limits: 초과 시 Pod 재시작(OOMKilled)
          resources:
            requests:
              cpu: "100m"      # 0.1 CPU 코어
              memory: "128Mi"  # 128MB
            limits:
              cpu: "500m"      # 0.5 CPU 코어
              memory: "256Mi"  # 256MB

          # [Issue #13] liveness 와 readiness 의 의미를 분리.
          #
          # livenessProbe: Pod 프로세스 생존 확인 — TCP 연결만 확인하여 DB 단절 시 재시작 루프를 피한다.
          # (/api/order/health 는 이제 DB 상태를 반영하므로 livenessProbe 로 쓰면 DB 장애 시 Pod 가 무한 재시작된다.)
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30

          # readinessProbe: 트래픽을 받을 수 있는 상태인지 확인
          # — /api/order/health 가 MongoDB 연결 상태를 반영 (503 이면 Service 에서 격리).
          readinessProbe:
            httpGet:
              path: /api/order/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
