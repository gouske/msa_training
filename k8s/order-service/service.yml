# [K8s] Service: Pod 들에게 고정 네트워크 주소를 부여하고 로드밸런싱
# Pod 은 생성/삭제될 때마다 IP 가 변하지만,
# Service 는 고정 DNS 이름(order-service)을 제공한다.
# 클러스터 내 다른 서비스는 http://order-service:8081 로 접근한다.
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: msa-training
spec:
  # selector: 이 Service 가 트래픽을 보낼 Pod 들의 레이블
  selector:
    app: order-service
  ports:
    - port: 8081        # Service 가 노출하는 포트
      targetPort: 8081  # Pod 내부 컨테이너 포트
  # type: ClusterIP → 클러스터 내부에서만 접근 가능 (기본값)
  # Gateway 를 통해서만 외부에 노출되므로 ClusterIP 로 충분하다.
  type: ClusterIP
