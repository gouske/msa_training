# [K8s] Secret 템플릿 — 저장소에는 더미 값만 커밋하고,
# 실제 배포 시 `cp secrets.example.yml secrets.yml` 로 복사한 뒤
# 로컬/환경별 진짜 값으로 교체해 사용한다.
#
# 실제 secrets.yml 은 .gitignore 로 추적 제외되어 커밋되지 않는다.
#
# ⚠️  Base64 는 암호화가 아니라 인코딩일 뿐이다. 실무에서는
#     Sealed Secrets(Bitnami), HashiCorp Vault, AWS Secrets Manager 등
#     외부 시크릿 관리 체계와 연동해야 한다.
#
# Base64 인코딩 예시:
#   echo -n "실제값" | base64
#
# ── 더미 값 생성 스크립트 ────────────────────────────────
#   echo -n "CHANGE_ME_USER"     | base64  → Q0hBTkdFX01FX1VTRVI=
#   echo -n "CHANGE_ME_PASSWORD" | base64  → Q0hBTkdFX01FX1BBU1NXT1JE
#   echo -n "CHANGE_ME_DB"       | base64  → Q0hBTkdFX01FX0RC
#   echo -n "CHANGE_ME_JWT_SECRET_AT_LEAST_32CHARS" | base64
#   echo -n "CHANGE_ME_INTERNAL_KEY"                | base64
apiVersion: v1
kind: Secret
metadata:
  name: msa-secrets
  namespace: msa-training
type: Opaque
data:
  # PostgreSQL 자격증명 (Auth Service DB) — 실제 값으로 교체 필수
  POSTGRES_USER: Q0hBTkdFX01FX1VTRVI=
  POSTGRES_PASSWORD: Q0hBTkdFX01FX1BBU1NXT1JE
  POSTGRES_DB: Q0hBTkdFX01FX0RC

  # JWT 비밀 키 (Gateway ↔ Auth Service 공유) — 실제 값으로 교체 필수
  # 최소 32 바이트 권장. 운영 키를 여기에 직접 넣지 말고 Vault/Sealed Secret 사용
  JWT_SECRET_KEY: Q0hBTkdFX01FX0pXVF9TRUNSRVRfQVRfTEVBU1RfMzJDSEFSUw==

  # 서비스 간 내부 API 키 (Order ↔ Payment) — 실제 값으로 교체 필수
  INTERNAL_API_KEY: Q0hBTkdFX01FX0lOVEVSTkFMX0tFWQ==
