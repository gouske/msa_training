# [K8s] RabbitMQ Deployment + Service
# Order ↔ Payment 비동기 메시징에 사용.
# management 태그: 관리 UI(15672 포트)가 포함된 이미지
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: msa-training
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672   # AMQP 프로토콜 포트 (서비스 간 통신)
            - containerPort: 15672  # 관리 UI 포트 (브라우저에서 접근)

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # RabbitMQ 준비 상태 확인: rabbitmq-diagnostics 명령어 사용
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 20
            periodSeconds: 15

---
# RabbitMQ Service: 서비스들이 rabbitmq:5672 로 접근
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: msa-training
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  type: ClusterIP
