# [K8s] Gateway Service Deployment
# C# + ASP.NET Core + YARP 기반. 외부 트래픽의 유일한 진입점.
# JWT 검증을 담당하므로 JWT_SECRET_KEY 가 반드시 주입돼야 한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: msa-training
  labels:
    app: gateway-service
    context: gateway    # API Gateway — 모든 바운디드 컨텍스트의 진입점
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: your-dockerhub/gateway-service:latest
          ports:
            - containerPort: 9000

          # ASP.NET Core 환경 설정
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:9000"
            # .NET 의 계층 구분자 __ : Jwt__SecretKey → appsettings.json 의 Jwt.SecretKey
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: msa-secrets
                  key: JWT_SECRET_KEY
            # [제22강] Consul 기반 동적 라우팅
            # Gateway 는 ConsulProxyConfigProvider 로 auth/order/payment-service
            # 엔드포인트를 폴링하여 YARP 클러스터를 갱신한다.
            # appsettings.json 의 route ClusterId (auth-service / order-service / payment-service)
            # 과 Consul 등록 service name 이 일치해야 한다.
            - name: Consul__Address
              value: "http://consul:8500"

          # .NET 은 메모리 효율이 좋으므로 적당한 값으로 설정
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # [제22강] /health 엔드포인트 기반 HTTP 프로브
          # [Issue #11] liveness / readiness 를 분리하여 readiness 정확도를 끌어올린다.
          #
          # livenessProbe: 프로세스 생존 확인 (앱이 살아있는가?)
          # → /health 는 정적으로 200 을 반환하므로 Consul / 백엔드 상태와 무관.
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 30

          # readinessProbe: 라우팅 가능 상태 확인 (auth/order/payment cluster 모두 ≥1 destination?)
          # → /health/ready 가 503 이면 Service endpoint 에서 자동 제외되어 트래픽이 격리된다.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
