# [K8s] Gateway Service: 외부 트래픽을 받는 유일한 진입점
# LoadBalancer 타입으로 외부 IP 를 할당받는다.
#   - 클라우드(AWS/GCP/Azure): 로드밸런서가 자동 생성됨
#   - 로컬(minikube): `minikube tunnel` 실행 후 EXTERNAL-IP 할당
#   - Docker Desktop: localhost 로 자동 매핑
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: msa-training
spec:
  selector:
    app: gateway-service
  ports:
    - port: 80         # 외부에서 접근하는 포트 (HTTP 기본 포트)
      targetPort: 9000 # Gateway 컨테이너 내부 포트
  # LoadBalancer: 클라우드 로드밸런서 또는 minikube tunnel 로 외부 접근 가능
  type: LoadBalancer
