# [K8s] ConfigMap: 설정 값을 외부화하여 코드와 설정을 분리
# docker-compose 의 environment 와 같은 역할이지만,
# Pod 재시작 없이 설정을 변경할 수 있다 (단, 변경 반영까지 수십 초 소요).
# 민감하지 않은 설정 값만 여기에 저장한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: msa-config
  namespace: msa-training
data:
  # 서비스 디스커버리: K8s Service 이름으로 접근
  # K8s 클러스터 내에서 서비스 이름이 DNS로 자동 등록된다.
  AUTH_HOST: auth-service
  PAYMENT_HOST: payment-service
  ORDER_SERVICE_URL: http://order-service:8081
  RABBITMQ_URL: amqp://rabbitmq
  RABBITMQ_HOST: rabbitmq
  MONGO_URI: mongodb://order-db:27017/order_db
